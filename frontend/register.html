<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Gravitas+One&family=Assistant:wght@200;400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="register-container">
    <h1>Register</h1>

    <form id="registerForm">
      <div>
        <label>Name:</label><br>
        <input type="text" id="name" required>
      </div>

      <div>
        <label>Email:</label><br>
        <input type="text" id="email" required>
      </div>

      <div>
        <label>Password:</label><br>
        <input type="password" id="password" required>
      </div>

      <button type="submit">Register</button>
    </form>

    <p id="errorMsg"></p>
    <p id="successMsg"></p>

    <p>Already have an account? <a href="index.html">Login here</a></p>
  </div>


  <script src="js/auth.js"></script>


  <style>
    :root {
      --main-padding: 5px;
      --main-radius: 5px;
      --cream: #f0ead2;
      --tan: #dde5b6;
      --olive: #adc178;
      --brown: #a98467;
      --darkbrown: #6c584c;
      --smallfont: 'Assistant', sans-serif;
      --bigfont: 'Gravitas One', serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background-color: var(--cream);
      font-family: var(--smallfont);
      color: var(--darkbrown);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .register-container {
      width: 90%;
      max-width: 450px;
      background-color: var(--tan);
      border-radius: 20px;
      padding: 2rem;
      text-align: center;
      box-shadow: 0 8px 20px rgba(108, 88, 76, 0.25);
    }

    h1 {
      font-family: var(--bigfont);
      font-size: 32pt;
      margin-bottom: 1.5rem;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      text-align: left;
    }

    label {
      font-weight: 700;
    }

    input {
      width: 100%;
      padding: 0.9rem;
      border: 2px solid var(--brown);
      border-radius: 12px;
      font-family: var(--smallfont);
      font-size: 1rem;
      background-color: var(--cream);
      color: var(--darkbrown);
      margin-top: 0.3rem;
    }

    input:focus {
      outline: none;
      border-color: var(--darkbrown);
      box-shadow: 0 0 0 3px rgba(169, 132, 103, 0.25);
    }

    button {
      padding: 0.9rem;
      border: none;
      border-radius: 12px;
      background-color: var(--olive);
      color: var(--darkbrown);
      font-family: var(--bigfont);
      font-size: 1rem;
      cursor: pointer;
      margin-top: 0.5rem;
    }

    button:hover {
      background-color: var(--brown);
      color: var(--cream);
    }

    a {
      color: var(--darkbrown);
      font-weight: 700;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    #errorMsg {
      color: #8b2f2f;
      font-weight: 700;
    }

    #successMsg {
      color: var(--darkbrown);
      background-color: var(--olive);
      border-radius: 10px;
      padding: 0.75rem;
    }

    @media only screen and (max-width: 700px) {
      .register-container {
        width: 92%;
        padding: 1.5rem;
      }

      h1 {
        font-size: 26pt;
      }
    }
  </style>

</body>
</html>
